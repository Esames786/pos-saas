<svg width="240" height="80" viewBox="0 0 240 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0.35" y2="1">
      <stop offset="0%" stop-color="#fff4cf"/>
      <stop offset="22%" stop-color="#f1d27a"/>
      <stop offset="48%" stop-color="#caa23f"/>
      <stop offset="60%" stop-color="#a87f24"/>
      <stop offset="80%" stop-color="#e3c163"/>
      <stop offset="100%" stop-color="#8a6712"/>
    </linearGradient>
    <radialGradient id="nv" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1e3a6b"/>
      <stop offset="100%" stop-color="#0a1022"/>
    </radialGradient>
  </defs>

  <!-- Diamond emblem -->
  <rect x="14" y="24" width="32" height="32" fill="url(#g)" transform="rotate(45 30 40)"/>
  <circle cx="30" cy="40" r="11" fill="#0a1022"/>
  <text x="30" y="44.5" font-family="Georgia,'Times New Roman',serif" font-size="13" font-weight="700" fill="url(#g)" text-anchor="middle">H</text>

  <!-- Arabic accent -->
  <text x="60" y="27" font-family="'Traditional Arabic','Segoe UI',serif" font-size="14" fill="#e3c163" direction="rtl">حبيبي</text>

  <!-- Gold calligraphic wordmark (white POS for dark backgrounds) -->
  <text x="58" y="55" font-family="Georgia,'Times New Roman',serif" font-size="29" font-weight="700" fill="url(#g)" letter-spacing="-0.5">Habibi</text>
  <text x="188" y="55" font-family="'Segoe UI',system-ui,sans-serif" font-size="15" font-weight="700" fill="#ffffff" letter-spacing="3">POS</text>

  <!-- Arabesque flourish -->
  <path d="M60 66 H214 M60 66 q-7 0 -7 -7 M214 66 q7 0 7 -7" stroke="url(#g)" stroke-width="1.6" fill="none"/>
  <circle cx="137" cy="66" r="2.6" fill="url(#g)"/>
</svg>
