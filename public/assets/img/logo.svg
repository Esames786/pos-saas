<svg width="200" height="52" viewBox="0 0 200 52" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="badgeL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e3a8a"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>

  <!-- Octagonal badge (Arabic geometric outer shape) -->
  <polygon points="14,1 36,1 50,15 50,37 36,51 14,51 0,37 0,15" fill="url(#badgeL)"/>

  <!-- Gold 8-pointed star (Arabic rub el hizb geometry) -->
  <polygon points="39,26 30.5,28.3 35,35 27.3,30.5 25,39 22.7,30.5 15,35 19.5,28.3 11,26 19.5,23.7 15,17 22.7,21.5 25,13 27.3,21.5 35,17 30.5,23.7"
           fill="#f59e0b"/>

  <!-- White diamond overlay (inner geometric accent) -->
  <polygon points="25,18 32,26 25,34 18,26" fill="white" opacity="0.15"/>

  <!-- White center circle -->
  <circle cx="25" cy="26" r="7.5" fill="white" opacity="0.96"/>

  <!-- H monogram -->
  <text x="25" y="30.5" font-family="Georgia,'Times New Roman',serif"
        font-size="10" font-weight="700" fill="#1e3a8a" text-anchor="middle">H</text>

  <!-- Wordmark -->
  <text x="62" y="27" font-family="Georgia,'Times New Roman',serif"
        font-size="21" font-weight="700" fill="#0f172a" letter-spacing="-0.3">Habibi</text>
  <text x="64" y="44" font-family="'Segoe UI',system-ui,Arial,sans-serif"
        font-size="11" font-weight="700" fill="#1d4ed8" letter-spacing="5.5">POS</text>
</svg>
