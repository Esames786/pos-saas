<svg width="220" height="52" viewBox="0 0 220 52" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Habibi POS">
  <defs>
    <linearGradient id="lgBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e3a8a"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <!-- Octagonal badge -->
  <polygon points="15,1 37,1 51,15 51,37 37,51 15,51 1,37 1,15" fill="url(#lgBg)"/>
  <!-- Gold 8-pointed star -->
  <polygon points="40,26 31.5,28.3 36,35 28.3,30.5 26,40 23.7,30.5 16,35 20.5,28.3 12,26 20.5,23.7 16,17 23.7,21.5 26,13 28.3,21.5 36,17 31.5,23.7"
           fill="#f59e0b"/>
  <!-- White diamond overlay -->
  <polygon points="26,18 33,26 26,34 19,26" fill="white" opacity="0.15"/>
  <!-- Center circle -->
  <circle cx="26" cy="26" r="8" fill="white" opacity="0.96"/>
  <!-- H monogram -->
  <text x="26" y="30.5" font-family="Georgia,serif" font-size="11" font-weight="700"
        fill="#1e3a8a" text-anchor="middle">H</text>
  <!-- Wordmark: dark version (for light backgrounds) -->
  <text x="64" y="28" font-family="Georgia,'Times New Roman',serif"
        font-size="22" font-weight="700" fill="#0f172a" letter-spacing="-0.5">Habibi</text>
  <text x="66" y="45" font-family="'Segoe UI',system-ui,Arial,sans-serif"
        font-size="11" font-weight="700" fill="#1d4ed8" letter-spacing="5.5">POS</text>
</svg>
